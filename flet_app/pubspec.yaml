# pubspec.yaml — Flet Android / iOS build config for Kitten TTS
# Place this file in flet_app/ before running: flet build apk

name: kitten_tts
description: Offline TTS with voice cloning — KittenTTS ONNX engine
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flet: any

flutter:
  uses-material-design: true

  assets:
    - assets/

# ── Android-specific ──────────────────────────────────────────────────────────
# Edit android/app/src/main/AndroidManifest.xml to add:
#   <uses-permission android:name="android.permission.RECORD_AUDIO"/>
#   <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
#   <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
